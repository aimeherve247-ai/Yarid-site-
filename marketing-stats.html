<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('YARID PWA : Prête !'))
        .catch(err => console.log('Erreur PWA :', err));

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARID | Marketing Analytics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 gap-4">
            <div>
                <h1 class="text-2xl font-black italic text-slate-900">YARID<span class="text-pink-500">.</span> ANALYTICS</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-[3px] font-bold">Marketing Intelligence System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadAnalytics()" class="text-xs font-bold bg-slate-100 text-slate-600 px-4 py-2 rounded-xl hover:bg-slate-200 transition">Actualiser</button>
                <a href="portail.html" class="text-xs font-bold bg-slate-900 text-white px-4 py-2 rounded-xl hover:bg-slate-800 transition shadow-lg shadow-slate-200">Retour Portail</a>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Visites Totales</p>
                <h2 id="total-views" class="text-3xl font-black text-slate-800 italic">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] text-pink-500 font-bold uppercase mb-2">Taux Conversion</p>
                <h2 id="conv-rate" class="text-3xl font-black text-pink-500 italic">0%</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] text-sky-500 font-bold uppercase mb-2">Trafic Mobile</p>
                <h2 id="mobile-views" class="text-3xl font-black text-sky-500 italic">0%</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] text-emerald-500 font-bold uppercase mb-2">Vitesse Moyenne</p>
                <h2 id="avg-load" class="text-3xl font-black text-emerald-500 italic">0ms</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                <h3 class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-pink-500 rounded-full animate-pulse"></span>
                    Tunnel de Conversion (Funnel)
                </h3>
                <div class="relative h-[300px]">
                    <canvas id="funnelChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm text-center">
                <h3 class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest">Sources de Trafic</h3>
                <canvas id="sourceChart"></canvas>
            </div>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                <h3 class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest text-center">Top Pages</h3>
                <canvas id="pagesChart"></canvas>
            </div>
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                <h3 class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest text-center">Appareils</h3>
                <div class="max-w-[200px] mx-auto">
                    <canvas id="deviceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let charts = {}; // Stockage des instances de graphiques pour reset

        async function loadAnalytics() {
            const { data, error } = await supabaseClient.from('site_analytics').select('*');
            if (error) return console.error(error);

            // 1. CALCULS DES KPI
            const total = data.filter(d => d.event_type === 'page_view').length;
            const mobile = data.filter(d => d.device_type === 'Mobile').length;
            const purchases = data.filter(d => d.event_type === 'paiement_valide').length;
            const convRate = total > 0 ? ((purchases / total) * 100).toFixed(1) : 0;
            
            // Calcul temps chargement moyen
            const loadTimes = data.filter(d => d.load_time_ms > 0).map(d => d.load_time_ms);
            const avgLoad = loadTimes.length > 0 ? Math.round(loadTimes.reduce((a,b) => a+b) / loadTimes.length) : 0;

            document.getElementById('total-views').innerText = total;
            document.getElementById('conv-rate').innerText = convRate + "%";
            document.getElementById('mobile-views').innerText = total > 0 ? Math.round((mobile/total)*100) + "%" : "0%";
            document.getElementById('avg-load').innerText = avgLoad + "ms";

            // 2. DATA POUR LE TUNNEL (FUNNEL)
            const funnelData = {
                'Visites': total,
                'Vues Produits': data.filter(d => d.event_type === 'vue_produit').length,
                'Ajouts Panier': data.filter(d => d.event_type === 'ajout_panier').length,
                'Ventes': purchases
            };

            updateChart('funnelChart', 'bar', Object.keys(funnelData), Object.values(funnelData), '#ec4899', true);

            // 3. DATA POUR LES SOURCES (UTM)
            const sources = {};
            data.forEach(d => {
                let src = d.utm_source || 'Direct';
                sources[src] = (sources[src] || 0) + 1;
            });
            updateChart('sourceChart', 'polarArea', Object.keys(sources), Object.values(sources), ['#0ea5e9', '#6366f1', '#f43f5e', '#f59e0b']);

            // 4. TOP PAGES
            const pages = {};
            data.filter(d => d.event_type === 'page_view').forEach(d => {
                pages[d.page_url] = (pages[d.page_url] || 0) + 1;
            });
            updateChart('pagesChart', 'bar', Object.keys(pages), Object.values(pages), '#1e293b');

            // 5. APPAREILS
            updateChart('deviceChart', 'doughnut', ['Mobile', 'PC'], [mobile, total - mobile], ['#0ea5e9', '#cbd5e1']);
        }

        // Fonction helper pour créer/maj les graphiques
        function updateChart(id, type, labels, data, colors, horizontal = false) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderRadius: 10,
                        borderWidth: 0
                    }]
                },
                options: {
                    indexAxis: horizontal ? 'y' : 'x',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type === 'doughnut' || type === 'polarArea' } }
                }
            });
        }

        loadAnalytics();
    </script>
</body>
</html>
