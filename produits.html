<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarid - Produits</title>
    <link rel="stylesheet" href="style.css"> 
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YARID">

<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon_16.png">
<link rel="apple-touch-icon" href="/icons/ios.png">

<meta property="og:type" content="website">
<meta property="og:title" content="YARID - Boutique Premium">
<meta property="og:description" content="Votre destination exclusive pour des produits d'exception au Cameroun.">
<meta property="og:image" content="/icons/icon_512.png">
<meta property="og:url" content="https://votre-site.netlify.app">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur SW:', err));
    });
  }
</script>

</head>
<body>
    <header style="padding: 20px; display: flex; align-items: center;">
        <a href="catégorie.html" style="text-decoration: none; font-size: 20px;">←</a>
        <h1 id="category-title" style="margin-left: 20px; font-size: 1.2rem;">Chargement...</h1>
    </header>

    <main id="product-container" style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        </main>

    <script>
        // 1. On récupère la catégorie dans l'URL (ex: ?cat=tech)
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('cat');

        // 2. On change le titre de la page
        const titleMap = {
            'parfums': 'Nos Parfums',
            'tech': 'Électronique & Tech',
            'mode': 'Mode & Vêtements'
        };
        document.getElementById('category-title').innerText = titleMap[category] || 'Produits';

        // 3. Simulation de base de données (À remplacer plus tard par ton vrai contenu)
        const products = [
            { id: 1, name: "Amouage", price: "75 000 F", cat: "parfums", img: "parfum.jpg" },
            { id: 2, name: "Casque Audio", price: "8 500 F", cat: "tech", img: "casque.jpg" },
            { id: 3, name: "Galaxy Z Flip", price: "850 000 F", cat: "tech", img: "phone.jpg" }
        ];

        // 4. On affiche uniquement les produits de la catégorie sélectionnée
        const container = document.getElementById('product-container');
        const filteredProducts = products.filter(p => p.cat === category);

        if (filteredProducts.length === 0) {
            container.innerHTML = "<p>Aucun produit trouvé dans cette catégorie.</p>";
        } else {
            container.innerHTML = filteredProducts.map(p => `
                <div class="product-card" style="border: 1px solid #eee; border-radius: 15px; padding: 10px; text-align: center;">
                    <img src="${p.img}" style="width: 100%; border-radius: 10px;">
                    <h3 style="font-size: 0.9rem; margin: 10px 0;">${p.name}</h3>
                    <p style="color: #0089ff; font-weight: bold;">${p.price}</p>
                    <button style="background: #0089ff; color: white; border: none; padding: 5px 10px; border-radius: 5px; width: 100%;">Acheter</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
