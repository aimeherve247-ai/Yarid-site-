<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARID | Portail de Gestion</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(err => console.log('Erreur PWA :', err));
        });
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-4">

    <button id="btn-install" class="hidden w-full max-w-sm mb-6 py-3 bg-sky-500 text-white font-bold rounded-xl shadow-lg transition-all hover:bg-sky-600 uppercase tracking-widest text-xs">
        Installer l'application
    </button>

    <div id="login-zone" class="bg-white p-8 rounded-3xl w-full max-sm:max-w-xs max-w-sm shadow-2xl text-center">
        <h1 class="text-2xl font-black mb-6 italic">YARID<span class="text-sky-500">.</span> PORTAIL</h1>
        
        <div id="inputs-group">
            <input type="text" id="username" placeholder="Identifiant" class="w-full p-4 mb-4 border border-slate-200 rounded-xl text-center outline-none focus:border-sky-500 font-bold">
            <input type="password" id="password" placeholder="Mot de passe" class="w-full p-4 mb-4 border border-slate-200 rounded-xl text-center outline-none focus:border-sky-500 font-bold">
        </div>
        
        <input type="text" id="code2fa" placeholder="Code 2FA" class="w-full p-4 mb-6 border-2 rounded-xl text-center hidden outline-none border-sky-500 font-black tracking-[0.5em] text-lg uppercase text-sky-600">
        
        <button id="btn-login" onclick="handleAuth()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase tracking-[0.2em] hover:bg-slate-800 transition-all">
            Se connecter
        </button>
    </div>

    <div id="portal-menu" class="hidden w-full max-w-lg bg-white p-8 rounded-3xl shadow-2xl">
        <h2 class="text-xl font-black mb-2 text-center text-slate-900 uppercase italic">Espace de Travail</h2>
        <p id="welcome-msg" class="text-center text-xs font-bold text-slate-400 mb-8 uppercase tracking-widest"></p>
        
        <div id="grid-menu" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        
        <button onclick="logout()" class="w-full mt-10 py-4 border-t border-slate-100 text-[10px] text-red-500 font-black uppercase tracking-[0.2em] hover:bg-slate-50 transition rounded-b-xl">
            Fermer la session
        </button>
    </div>

    <script>
        // 1. CONFIGURATION SUPABASE
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. CONFIGURATION DES ROLES ET PAGES
      // À mettre à jour dans le <script> de ton portail.html
const permissions = {
    "superadmin": { 
        name: "Direction", 
        landing: "hub-admin.html", 
        menu: ["hub-admin", "livreurs-gestion", "admin-map", "promotions-gestion", "ticket", "admin-facture"] 
    },
    "logistique": { 
        name: "Service Logistique", 
        landing: "livreurs-gestion.html", 
        menu: ["livreurs-gestion", "admin-map"] 
    },
    "marketing": { 
        name: "Service Marketing", 
        landing: "promotions-gestion.html", 
        menu: ["promotions-gestion", "ticket"] 
    },
    "livreur": { 
        name: "Livreur Terrain", 
        landing: "livreur-terrain.html", 
        menu: ["livreur-terrain"] 
    }
};


        let currentUser = null;

        // 3. LOGIQUE D'AUTHENTIFICATION (Identifiant -> 2FA -> Redirection)
        async function handleAuth() {
            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;
            const codeInp = document.getElementById('code2fa');

            // ETAPE B : Vérification du Code 2FA
            if (!codeInp.classList.contains('hidden')) {
                if (codeInp.value === currentUser.code_2fa) {
                    executeRedirection(currentUser.role, currentUser.nom_complet, currentUser.username);
                } else {
                    alert("Code 2FA incorrect !");
                }
                return;
            }

            // ETAPE A : Vérification Identifiants via Supabase
            if(!userInp || !passInp) return alert("Veuillez remplir tous les champs.");

            try {
                const { data, error } = await _supabase
                    .from('employes')
                    .select('*')
                    .eq('username', userInp)
                    .eq('password_hash', passInp)
                    .eq('statut', true)
                    .single();

                if (error || !data) {
                    alert("Accès refusé : Identifiants incorrects ou compte inactif.");
                    return;
                }

                // Succès de l'étape 1 : On affiche le champ 2FA
                currentUser = data;
                document.getElementById('inputs-group').classList.add('hidden');
                codeInp.classList.remove('hidden');
                document.getElementById('btn-login').innerText = "Valider 2FA";
                
            } catch (err) {
                alert("Erreur de connexion au serveur.");
            }
        }

        // 4. LA CONNEXION (Création du passeport et redirection)
        function executeRedirection(role, nom, username) {
            // C'EST ICI QUE LA MAGIE OPÈRE : On crée le passeport pour les autres pages
            localStorage.setItem('yarid_user', JSON.stringify({ role: role, nom: nom, username: username }));
            
            trackEvent('login_success', { role: role }); // Envoi Analytics

            const config = permissions[role];
            
            // Si c'est un rôle avec une page unique (ex: livreur), on l'envoie direct
            if (config && config.landing && role !== 'superadmin') {
                window.location.href = config.landing;
            } else {
                // Si c'est le Boss (superadmin), on affiche le menu avec tous les boutons
                showMenu(role, nom);
            }
        }

        // 5. AFFICHAGE DU MENU ADMINISTRATEUR
        function showMenu(role, nom) {
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('portal-menu').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Session active : " + nom;
            
            const menu = permissions[role].menu;
            const grid = document.getElementById('grid-menu');
            grid.innerHTML = "";
            
            menu.forEach(item => {
                const fileName = item + ".html"; // Ex: marketing-stats.html
                const cleanName = item.replace('-', ' ');
                grid.innerHTML += `
                    <a href="${fileName}" class="p-5 bg-slate-50 border border-slate-100 rounded-2xl font-black text-center text-[10px] text-slate-700 hover:bg-sky-500 hover:text-white hover:border-sky-500 transition-all shadow-sm flex items-center justify-center uppercase tracking-widest">
                        ${cleanName}
                    </a>`;
            });
        }

        // 6. DÉCONNEXION PROPRE
        function logout() {
            localStorage.removeItem('yarid_user'); // Destruction du passeport
            sessionStorage.clear();
            location.reload();
        }

        // ==========================================
        // 7. SYSTÈME D'ANALYTICS INTÉGRÉ
        // ==========================================
        const sessionId = sessionStorage.getItem('yarid_session_id') || 'sess_' + Math.random().toString(36).substr(2, 9);
        sessionStorage.setItem('yarid_session_id', sessionId);

        async function trackEvent(eventName, eventDetails = {}) {
            const device = /Android|webOS|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) ? 'Mobile' : 'Ordinateur';
            try {
                await _supabase.from('site_analytics').insert([{
                    event_type: eventName,
                    page_url: 'portail',
                    device_type: device,
                    session_id: sessionId,
                    details: eventDetails
                }]);
            } catch (err) {}
        }

        window.addEventListener('load', () => trackEvent('page_view'));

        // ==========================================
        // 8. INSTALLATION PWA
        // ==========================================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btn-install').classList.remove('hidden');
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('btn-install').classList.add('hidden');
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
