<script>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm bg-white rounded-[2.5rem] p-10 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">YARID<span class="text-sky-500">.</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Accès Administrateur</p>
        </div>

        <div class="space-y-4">
            <input type="password" id="adminCode" placeholder="Code secret" 
                class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-sky-500 font-bold text-center">
            
            <button onclick="checkLogin()" id="loginBtn"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-sky-500 transition-all">
                Se connecter
            </button>
        </div>
        
        <p id="errorMsg" class="text-red-500 text-[10px] font-bold uppercase text-center mt-6 hidden italic"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkLogin() {
            const inputCode = document.getElementById('adminCode').value;
            const btn = document.getElementById('loginBtn');
            const errorP = document.getElementById('errorMsg');

            if(!inputCode) { alert("Entrez un code !"); return; }

            btn.innerText = "VÉRIFICATION...";
            btn.disabled = true;

            try {
                // Tentative de lecture du code dans Supabase
                const { data, error } = await _supabase
                    .from('admin_auth')
                    .select('password_code')
                    .maybeSingle();

                if (error) {
                    console.error(error);
                    alert("Erreur Supabase : " + error.message);
                    return;
                }

                if (!data) {
                    alert("La table 'admin_auth' est vide ou inaccessible (RLS).");
                    return;
                }

                if (inputCode === data.password_code) {
                    sessionStorage.setItem('yarid_admin_session', 'active');
                    window.location.href = 'admin.html';
                } else {
                    errorP.innerText = "Code incorrect";
                    errorP.classList.remove('hidden');
                }

            } catch (err) {
                alert("Erreur système : " + err.message);
            } finally {
                btn.innerText = "SE CONNECTER";
                btn.disabled = false;
            }
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const analyticsClient = supabase.createClient('https://whcpugnkldbmuqzgqxbe.supabase.co', 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk');

    // 1. GESTION DE LA SESSION (Pour le tunnel de conversion)
    // Crée un ID unique pour la visite, qui s'efface quand on ferme le navigateur
    if (!sessionStorage.getItem('yarid_session_id')) {
        sessionStorage.setItem('yarid_session_id', 'sess_' + Math.random().toString(36).substr(2, 9));
    }
    const sessionId = sessionStorage.getItem('yarid_session_id');

    // 2. LECTURE DES CAMPAGNES MARKETING (UTM)
    const urlParams = new URLSearchParams(window.location.search);
    const utmSource = urlParams.get('utm_source') || 'direct';
    const utmCampaign = urlParams.get('utm_campaign') || null;

    // 3. IDENTIFICATION UTILISATEUR (Segmentation)
    // Si l'utilisateur s'est connecté via le portail, on récupère son ID
    const activeUser = JSON.parse(localStorage.getItem('yarid_user') || '{}');
    const userId = activeUser.username || null;

    // 4. MOTEUR D'ENVOI DES DONNÉES
    async function trackEvent(eventName, eventDetails = {}) {
        // Calcul du temps de chargement pour les événements "page_view"
        let loadTime = null;
        if (eventName === 'page_view' && window.performance) {
            loadTime = Math.round(performance.now());
        }

        const device = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ? 'Mobile' : 'Ordinateur';

        const payload = {
            event_type: eventName,
            page_url: window.location.pathname.split('/').pop() || 'accueil',
            device_type: device,
            session_id: sessionId,
            user_id: userId,
            utm_source: utmSource,
            utm_campaign: utmCampaign,
            load_time_ms: loadTime,
            details: eventDetails // Pour les infos produits, panier, etc.
        };

        try {
            await analyticsClient.from('site_analytics').insert([payload]);
        } catch (err) {
            console.error("Tracker Error:", err);
        }
    }

    // 5. DÉCLENCHEURS AUTOMATIQUES
    // Enregistre la vue de la page au chargement complet
    window.addEventListener('load', () => {
        trackEvent('page_view', { title: document.title });
    });
</script>

</body>
</html>
