<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARID | Espace Livreur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: none !important;
        }
        #reader__dashboard_section_csr button {
            background: #0ea5e9 !important;
            color: white !important;
            padding: 10px 20px !important;
            border-radius: 10px !important;
            text-transform: uppercase !important;
            font-weight: bold !important;
            font-size: 12px !important;
        }
    </style>
</head>
<body class="bg-slate-900 text-white p-4 font-sans min-h-screen flex flex-col justify-between">

    <div class="max-w-md mx-auto w-full">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-sky-500">YARID <span class="text-white">TERRAIN</span></h1>
                <p id="system-status" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Connecté au réseau</p>
            </div>
            <div id="gps-status" class="px-3 py-1 rounded-full bg-slate-800 text-[9px] font-bold text-slate-500 uppercase tracking-widest border border-slate-700 flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-slate-500" id="gps-dot"></span>
                <span id="gps-text">GPS INACTIF</span>
            </div>
        </div>

        <select id="selectLivreur" onchange="initialiserLivreur()" class="w-full bg-slate-800 p-4 rounded-2xl font-bold text-sm mb-6 border-none outline-none focus:ring-2 focus:ring-sky-500 text-white">
            <option value="">-- Qui êtes-vous ? --</option>
        </select>

        <div id="mes-livraisons" class="space-y-4">
            <p class="text-center text-slate-500 text-xs py-10">Choisissez votre nom pour voir vos courses et activer le GPS.</p>
        </div>
    </div>

    <div id="view-scanner" class="fixed inset-0 bg-slate-900 z-[60] flex flex-col items-center p-6 hidden">
        <div class="w-full max-w-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sky-500 font-black italic">SCANNER LE CLIENT</h2>
                <button onclick="stopScanner()" class="text-slate-400 font-bold text-xs uppercase">Annuler</button>
            </div>
            
            <div id="reader" class="bg-slate-800"></div>
            
            <div class="mt-8 p-6 bg-slate-800 rounded-3xl border border-slate-700">
                <p class="text-[10px] text-slate-400 uppercase font-black mb-2 tracking-widest">Instructions</p>
                <p class="text-xs text-slate-300">Placez le QR Code de la facture du client dans le cadre pour valider la remise du colis.</p>
            </div>
        </div>
    </div>

    <div id="modal-resultat" class="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center">
            <div id="icon-status" class="w-20 h-20 mx-auto mb-6 flex items-center justify-center rounded-full"></div>
            <h3 id="result-title" class="text-slate-900 font-black text-xl mb-2 italic"></h3>
            <p id="result-msg" class="text-slate-500 text-sm mb-8"></p>
            <div id="result-price" class="text-3xl font-black text-slate-900 mb-8 hidden"></div>
            <button onclick="finaliserLivraison()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-sm tracking-widest">Confirmer la remise</button>
        </div>
    </div>

    <footer class="mt-12 border-t border-slate-800 py-6 max-w-md mx-auto w-full">
        <div class="flex justify-between items-center">
            <a href="portail.html" class="flex items-center gap-2 text-[10px] font-bold text-slate-400 hover:text-sky-500 transition-all uppercase tracking-[2px]">← PORTAIL</a>
            <button onclick="quitterSession()" class="text-[10px] font-bold text-red-500 hover:text-red-400 transition-all uppercase tracking-[2px]">DÉCONNEXION</button>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let gpsWatcherId = null;
        let html5QrScanner = null;
        let currentOrderId = null;
        const conteneurMissions = document.getElementById('mes-livraisons');

        async function chargerLivreurs() {
            try {
                const { data, error } = await _supabase.from('livreur').select('nom').order('nom');
                if (data) {
                    const select = document.getElementById('selectLivreur');
                    data.forEach(l => {
                        const opt = document.createElement('option');
                        opt.value = l.nom;
                        opt.innerText = l.nom.toUpperCase();
                        select.appendChild(opt);
                    });
                }
            } catch (err) { console.error(err); }
        }

        function initialiserLivreur() {
            fetchMissions();
            demarrerGPS();
        }

        function demarrerGPS() {
            const nomLivreur = document.getElementById('selectLivreur').value;
            if (!nomLivreur) { arreterGPS(); return; }
            gpsWatcherId = navigator.geolocation.watchPosition(async (pos) => {
                await _supabase.from('livreur').update({ 
                    latitude: pos.coords.latitude, 
                    longitude: pos.coords.longitude, 
                    derniere_position: new Date().toISOString() 
                }).eq('nom', nomLivreur);
                document.getElementById('gps-text').innerText = "GPS ACTIF";
                document.getElementById('gps-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
            }, null, { enableHighAccuracy: true });
        }

        function arreterGPS() {
            if (gpsWatcherId) navigator.geolocation.clearWatch(gpsWatcherId);
        }

        async function fetchMissions() {
            const nomLivreur = document.getElementById('selectLivreur').value;
            if(!nomLivreur) return;

            const { data, error } = await _supabase.from('commande')
                .select('*').eq('livreur', nomLivreur).eq('statut', 'en_attente');

            if(data) {
                conteneurMissions.innerHTML = data.map(m => `
                    <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-sky-500 font-black text-xs uppercase italic">${m.order_id}</span>
                            <span class="text-[10px] font-bold ${m.statut === 'a_encaisser' ? 'text-orange-500' : 'text-emerald-500'} bg-slate-900 px-3 py-1 rounded-full">
                                ${m.statut === 'a_encaisser' ? 'À ENCAISSER' : 'DÉJÀ PAYÉ'}
                            </span>
                        </div>
                        <p class="font-bold text-sm mb-2 text-slate-200">${m.article} (x${m.quantite || 1})</p>
                        <p class="text-[10px] text-slate-500 mb-6 uppercase tracking-widest">Client: ${m.client_nom}</p>
                        <button onclick="ouvrirScanner('${m.order_id}')" class="w-full bg-white text-slate-900 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-sky-500 hover:text-white transition-all">
                            Scanner le QR Client
                        </button>
                    </div>
                `).join('');
            }
        }

        // --- GESTION DU SCANNER ---

        function ouvrirScanner(orderId) {
            currentOrderId = orderId;
            document.getElementById('view-scanner').classList.remove('hidden');
            
            html5QrScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrScanner.start({ facingMode: "environment" }, config, onScanSuccess);
        }

        async function onScanSuccess(decodedText) {
            // Le QR code contient l'order_id (ex: YRD-XXXXXX)
            if (decodedText.trim() === currentOrderId) {
                stopScanner();
                verifierCommande(currentOrderId);
            } else {
                alert("Attention : Ce QR Code ne correspond pas à cette commande !");
            }
        }

        function stopScanner() {
            if (html5QrScanner) {
                html5QrScanner.stop().then(() => {
                    document.getElementById('view-scanner').classList.add('hidden');
                });
            }
        }

        async function verifierCommande(orderId) {
            const { data, error } = await _supabase.from('commande').select('*').eq('order_id', orderId).single();
            
            if (data) {
                const modal = document.getElementById('modal-resultat');
                const title = document.getElementById('result-title');
                const msg = document.getElementById('result-msg');
                const price = document.getElementById('result-price');
                const icon = document.getElementById('icon-status');

                modal.classList.remove('hidden');
                
                if (data.statut === 'a_encaisser') {
                    title.innerText = "À ENCAISSER !";
                    msg.innerText = "Récupérez le montant suivant auprès du client :";
                    price.innerText = data.montant_total.toLocaleString() + " FCFA";
                    price.classList.remove('hidden');
                    icon.className = "w-20 h-20 mx-auto mb-6 flex items-center justify-center rounded-full bg-orange-100 text-orange-600 font-black text-2xl";
                    icon.innerText = "FCFA";
                } else {
                    title.innerText = "DÉJÀ PAYÉ";
                    msg.innerText = "La commande a été réglée d'avance. Remettez simplement le colis.";
                    price.classList.add('hidden');
                    icon.className = "w-20 h-20 mx-auto mb-6 flex items-center justify-center rounded-full bg-emerald-100 text-emerald-600";
                    icon.innerHTML = "✓";
                }
            }
        }

        async function finaliserLivraison() {
            const { error } = await _supabase.from('commande')
                .update({ statut: 'livre', date_livraison: new Date().toISOString() })
                .eq('order_id', currentOrderId);

            if (!error) {
                alert("Livraison validée avec succès !");
                document.getElementById('modal-resultat').classList.add('hidden');
                fetchMissions();
            }
        }

        function quitterSession() {
            arreterGPS();
            window.location.href = "portail.html";
        }

        chargerLivreurs();
    </script>
</body>
</html>
