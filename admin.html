<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('YARID PWA : Prête !'))
            .catch(err => console.log('Erreur PWA :', err));
        });
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARID | Dashboard Admin Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4 md:p-10 font-sans text-slate-900">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-slate-900">YARID <span class="text-sky-500 underline">ADMIN</span></h1>
                <p id="stats-ca" class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">Calcul du flux financier...</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <a href="index.html" class="text-[9px] font-bold uppercase bg-white px-5 py-2.5 rounded-full border border-slate-200 hover:bg-slate-50 transition shadow-sm">Accéder au site</a>
                <a href="livreurs-gestion.html" class="text-[9px] font-bold uppercase bg-slate-900 text-white px-5 py-2.5 rounded-full shadow-lg hover:bg-sky-500 transition-all">Logistique Livreurs</a>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6 text-center">Gestion Stock & Inventaire</h2>
                    <form id="productForm" class="space-y-3">
                        <input type="text" id="name" placeholder="Nom du produit" required class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-sky-500">
                        
                        <div class="relative">
                            <input type="text" id="categorie" list="categoryOptions" placeholder="Catégorie (Taper pour créer ou choisir)" required class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-sky-500">
                            <datalist id="categoryOptions">
                                <option value="Construction">
                                <option value="Digital">
                                <option value="Boutique">
                            </datalist>
                        </div>

                        <input type="number" id="price" placeholder="Prix (FCFA)" required class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-sky-500">
                        <textarea id="description" placeholder="Détails techniques..." required class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-sky-500 h-20"></textarea>
                        <input type="text" id="image_url" placeholder="URL de l'image" required class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none focus:ring-2 focus:ring-sky-500">
                        
                        <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl">
                            <input type="checkbox" id="is_star" class="w-4 h-4 accent-sky-500">
                            <label for="is_star" class="text-[9px] font-black uppercase text-slate-500">Produit Vedette</label>
                        </div>
                        <button type="submit" id="btnSubmit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:scale-[1.02] transition-all">Enregistrer le produit</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-sky-500 mb-6 text-center">Nouveau Service</h2>
                    <form id="serviceForm" class="space-y-3">
                        <select id="servicePage" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                            <option value="digital-details.html">Page Digital</option>
                            <option value="btp-details.html">Page BTP</option>
                            <option value="index.html">Page Accueil</option>
                        </select>
                        <input type="text" id="serviceNom" placeholder="Nom du service" required class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                        <button type="submit" class="w-full bg-sky-500 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Ajouter le service</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 mb-6 text-center">Flash Promotion</h2>
                    <div class="space-y-3">
                        <input type="text" id="promoTitre" placeholder="Libellé (ex: Promo Ramadan)" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                        <input type="text" id="promoImg" placeholder="URL Image (1920x1080 conseillé)" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px] font-bold uppercase ml-2 text-slate-400">Début</label>
                                <input type="date" id="promoStart" class="w-full p-3 bg-slate-50 rounded-xl text-[10px] font-bold border-none outline-none">
                            </div>
                            <div>
                                <label class="text-[8px] font-bold uppercase ml-2 text-slate-400">Fin</label>
                                <input type="date" id="promoEnd" class="w-full p-3 bg-slate-50 rounded-xl text-[10px] font-bold border-none outline-none">
                            </div>
                        </div>
                        <button onclick="ajouterPromo()" class="w-full bg-orange-400 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Publier sur le site</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-6">Inventaire des Produits</h2>
                    <div id="stockList" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 mb-6 italic">Promotions en diffusion (Carrousel Index)</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <tbody id="promoList"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Flux des Commandes</h2>
                        <button onclick="fetchOrders()" class="bg-slate-50 text-sky-500 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest">Actualiser</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[9px] font-black uppercase text-slate-400 border-b border-slate-50">
                                    <th class="pb-4">Facture</th>
                                    <th class="pb-4">Client</th>
                                    <th class="pb-4">Livreur</th>
                                    <th class="pb-4 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="orderList"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- DYNAMISME DES CATÉGORIES ---
        async function refreshCategories() {
            const { data } = await _supabase.from('PRODUITS').select('categorie');
            if (data) {
                const uniqueCats = [...new Set(data.map(i => i.categorie))];
                document.getElementById('categoryOptions').innerHTML = uniqueCats.map(c => `<option value="${c}">`).join('');
            }
        }

        // --- GESTION DU STOCK ---
        async function fetchProducts() {
            const { data, error } = await _supabase.from('PRODUITS').select('*').order('id', { ascending: false });
            if (error) return console.error(error);
            const stockList = document.getElementById('stockList');
            stockList.innerHTML = data.map(item => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <img src="${item.image_url}" class="w-12 h-12 object-cover rounded-xl shadow-md">
                            ${item.is_star ? '<span class="absolute -top-2 -left-2 bg-yellow-400 w-4 h-4 rounded-full border-2 border-white"></span>' : ''}
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase leading-none">${item.name}</p>
                            <p class="text-sky-500 text-[9px] font-bold mt-1">${item.categorie}</p>
                            <p class="text-slate-400 text-[9px] font-bold">${item.price} FCFA</p>
                        </div>
                    </div>
                    <button onclick="deleteProduct(${item.id})" class="bg-white p-2 rounded-lg text-red-400 hover:text-red-600 transition shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).join('');
            refreshCategories();
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "TRANSFERT EN COURS...";
            const newProduct = {
                name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value),
                description: document.getElementById('description').value,
                categorie: document.getElementById('categorie').value,
                image_url: document.getElementById('image_url').value,
                is_star: document.getElementById('is_star').checked
            };
            await _supabase.from('PRODUITS').insert([newProduct]);
            document.getElementById('productForm').reset();
            btn.innerText = "Enregistrer le produit";
            fetchProducts();
        };

        window.deleteProduct = async (id) => {
            if(confirm("Confirmer la suppression de cet article ?")) {
                await _supabase.from('PRODUITS').delete().eq('id', id);
                fetchProducts();
            }
        };

        // --- GESTION DES SERVICES ---
        document.getElementById('serviceForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                nom: document.getElementById('serviceNom').value,
                page_cible: document.getElementById('servicePage').value
            };
            await _supabase.from('SERVICES').insert([data]);
            alert("Service ajouté avec succès !");
            document.getElementById('serviceForm').reset();
        };

        // --- PROMOTIONS AVEC DATES ---
        async function ajouterPromo() {
            const titre = document.getElementById('promoTitre').value;
            const img = document.getElementById('promoImg').value;
            const start = document.getElementById('promoStart').value;
            const end = document.getElementById('promoEnd').value;

            if(!titre || !img || !start || !end) return alert("Veuillez remplir tous les champs de la promotion.");

            const { error } = await _supabase.from('PROMOTIONS').insert([{ 
                titre: titre, 
                image_url: img,
                date_debut: start,
                date_fin: end
            }]);
            
            if (error) {
                console.error(error);
                alert("Erreur lors de l'ajout : " + error.message);
            } else {
                alert("Promotion programmée ! Elle sera visible sur le carrousel.");
                // Reset des champs
                document.getElementById('promoTitre').value = '';
                document.getElementById('promoImg').value = '';
                document.getElementById('promoStart').value = '';
                document.getElementById('promoEnd').value = '';
                fetchPromos();
            }
        }

      // --- PROMOTIONS (CORRIGÉ EN MINUSCULES) ---
async function ajouterPromo() {
    const titre = document.getElementById('promoTitre').value;
    const img = document.getElementById('promoImg').value;
    const start = document.getElementById('promoStart').value;
    const end = document.getElementById('promoEnd').value;

    if(!titre || !img || !start || !end) return alert("Veuillez remplir tous les champs.");

    // Changement ici : 'promotions' au lieu de 'PROMOTIONS'
    const { error } = await _supabase.from('promotions').insert([{ 
        titre: titre, 
        image_url: img,
        date_debut: start,
        date_fin: end
    }]);
    
    if (error) {
        console.error("Erreur Supabase :", error);
        alert("Erreur : " + error.message);
    } else {
        alert("Promotion publiée !");
        document.getElementById('promoTitre').value = '';
        document.getElementById('promoImg').value = '';
        fetchPromos();
    }
}

async function fetchPromos() {
    // Changement ici : 'promotions' au lieu de 'PROMOTIONS'
    const { data: promos, error } = await _supabase.from('promotions').select('*').order('id', { ascending: false });
    if (error) return console.error(error);
    
    const promoList = document.getElementById('promoList');
    if (!promos || promos.length === 0) {
        promoList.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-slate-400 text-[10px]">Aucune promo</td></tr>';
        return;
    }

    promoList.innerHTML = promos.map(p => `
        <tr class="border-b border-slate-50 text-[11px] group">
            <td class="py-4"><img src="${p.image_url}" class="w-16 h-10 object-cover rounded-xl shadow-sm"></td>
            <td class="py-4 px-4">
                <p class="font-black uppercase text-[10px]">${p.titre}</p>
                <p class="text-[8px] text-orange-400 font-bold">Du ${new Date(p.date_debut).toLocaleDateString()} au ${new Date(p.date_fin).toLocaleDateString()}</p>
            </td>
            <td class="py-4 text-right">
                <button onclick="deletePromo(${p.id})" class="text-red-400 font-black uppercase text-[9px] bg-red-50 px-3 py-1.5 rounded-full opacity-0 group-hover:opacity-100 transition">Supprimer</button>
            </td>
        </tr>
    `).join('');
}

window.deletePromo = async (id) => {
    if(confirm("Retirer cette promotion ?")) {
        // Changement ici : 'promotions' au lieu de 'PROMOTIONS'
        await _supabase.from('promotions').delete().eq('id', id);
        fetchPromos();
    }
};

        // --- COMMANDES & CA ---
        async function fetchOrders() {
            const { data: commandes } = await _supabase.from('commande').select('*').order('created_at', { ascending: false });
            const { data: livreurs } = await _supabase.from('livreur').select('nom');
            
            let totalCA = 0;
            const orderList = document.getElementById('orderList');
            
            if (!commandes) return;

            orderList.innerHTML = commandes.map(o => {
                totalCA += parseInt(o.montant_total || 0);
                return `
                <tr class="border-b border-slate-50 text-[11px] hover:bg-slate-50 transition">
                    <td class="py-5 font-bold text-sky-500 uppercase">#${o.order_id}</td>
                    <td class="py-5">
                        <p class="font-black uppercase">${o.client_nom || 'Anonyme'}</p>
                        <p class="text-slate-400 text-[9px]">${o.client_phone || 'Pas de numéro'}</p>
                    </td>
                    <td class="py-5">
                        <select onchange="updateLivreur(${o.id}, this.value)" class="bg-white border border-slate-100 p-2 rounded-xl font-bold uppercase text-[8px] shadow-sm outline-none">
                            <option value="">En attente...</option>
                            ${livreurs ? livreurs.map(l => `<option value="${l.nom}" ${o.livreur === l.nom ? 'selected' : ''}>${l.nom}</option>`).join('') : ''}
                        </select>
                    </td>
                    <td class="py-5 text-right">
                        <button onclick="sendWhatsApp('${o.client_phone}', '${o.order_id}')" class="bg-green-500 text-white px-4 py-2 rounded-full font-black uppercase text-[8px] shadow-lg shadow-green-100">Envoyer Ticket</button>
                    </td>
                </tr>
            `}).join('');

            document.getElementById('stats-ca').innerHTML = `CA GLOBAL : <span class="text-sky-500 underline">${totalCA.toLocaleString()} FCFA</span>`;
        }

        // --- UTILITAIRES MANQUANTS ---
        window.updateLivreur = async (id, nomLivreur) => {
            const { error } = await _supabase.from('commande').update({ livreur: nomLivreur }).eq('id', id);
            if (!error) alert("Livreur assigné avec succès !");
            else alert("Erreur lors de l'assignation.");
        };

        window.sendWhatsApp = (phone, orderId) => {
            if(!phone) return alert("Numéro de téléphone manquant.");
            const message = encodeURIComponent(`Bonjour, votre commande #${orderId} sur YARID est en cours de traitement.`);
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        };

        // Lancement initial
        fetchProducts();
        fetchOrders();
        fetchPromos();
    </script>
</body>
</html>
