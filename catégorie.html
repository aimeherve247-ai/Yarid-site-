<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Catégories | YARID</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        body { 
            background: #f8fafc; 
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }
        
        /* Design des cartes */
        .category-card {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        
        .category-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border-color: #0ea5e9;
        }
        
        .category-image-container {
            width: 56px;
            height: 56px;
            border-radius: 1rem;
            overflow: hidden;
            background: #f1f5f9;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }
        
        .nav-item.active { color: #0ea5e9; }
    </style>
</head>
<body class="antialiased text-slate-900 pb-20">

    <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md z-50 border-b border-slate-100">
        <div class="flex items-center justify-between px-4 h-14">
            <button onclick="history.back()" class="p-2 -ml-2 rounded-full hover:bg-slate-100 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="text-lg font-black italic uppercase">Catégories</h1>
            <div class="w-9"></div>
        </div>
    </header>

    <main class="pt-14">
        
        <section class="px-4 py-4">
            <div class="relative">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" 
                       id="category-search" 
                       placeholder="Rechercher une catégorie..." 
                       class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:border-sky-500 transition"
                       oninput="filterCategories(this.value)">
            </div>
        </section>

        <section class="px-4 pb-6">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Toutes les catégories</h2>
            
            <div class="grid grid-cols-3 gap-3" id="categories-grid">
                <div class="col-span-3 py-10 text-center text-slate-400 text-xs animate-pulse">Chargement de l'inventaire...</div>
            </div>
        </section>

        <section class="px-4 pb-6">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-sky-500 mb-4">Sélection Populaire</h2>
            <div class="space-y-3" id="popular-categories">
                </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <div class="flex justify-around items-center h-16">
            <a href="index.html" class="nav-item flex flex-col items-center gap-1 p-2 text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4m-4 0h4"/></svg>
                <span class="text-[9px] font-bold">Accueil</span>
            </a>
            <a href="categories.html" class="nav-item active flex flex-col items-center gap-1 p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                <span class="text-[9px] font-bold">Catégories</span>
            </a>
            <button onclick="window.location.href='index.html#cart'" class="nav-item flex flex-col items-center gap-1 p-2 text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span class="text-[9px] font-bold">Panier</span>
            </button>
            <button onclick="window.location.href='index.html#account'" class="nav-item flex flex-col items-center gap-1 p-2 text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span class="text-[9px] font-bold">Compte</span>
            </button>
        </div>
    </nav>

    <script>
        // Identifiants de connexion
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', fetchCategoriesFromDB);

        async function fetchCategoriesFromDB() {
            // Récupération des produits pour extraire les catégories
            const { data: produits, error } = await _supabase
                .from('PRODUITS')
                .select('categorie, image_url')
                .order('id', { ascending: false });

            if (error) {
                console.error("Erreur Supabase:", error);
                return;
            }

            // Groupement par catégorie unique
            const categoryData = {};
            produits.forEach(p => {
                if (!categoryData[p.categorie]) {
                    categoryData[p.categorie] = {
                        name: p.categorie,
                        image: p.image_url, // On utilise l'image du produit le plus récent
                        count: 0
                    };
                }
                categoryData[p.categorie].count++;
            });

            const uniqueList = Object.values(categoryData);
            renderGrid(uniqueList);
            renderPopular(uniqueList.slice(0, 4)); // Affiche les 4 premières en populaire
        }

        function renderGrid(list) {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = list.map(cat => `
                <div class="category-card" onclick="goToCategory('${cat.name}')">
                    <div class="category-image-container">
                        <img src="${cat.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <span class="text-[10px] font-black uppercase text-slate-700 text-center leading-tight">${cat.name}</span>
                    <span class="text-[8px] font-bold text-slate-400">${cat.count} Articles</span>
                </div>
            `).join('');
        }

        function renderPopular(list) {
            const container = document.getElementById('popular-categories');
            container.innerHTML = list.map(cat => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 cursor-pointer" onclick="goToCategory('${cat.name}')">
                    <div class="flex items-center gap-4 p-3">
                        <img src="${cat.image}" class="w-20 h-20 object-cover rounded-xl shadow-inner">
                        <div class="flex-1">
                            <h3 class="font-black text-xs uppercase text-slate-900">${cat.name}</h3>
                            <p class="text-[10px] text-slate-400 mt-0.5 italic">Qualité premium YARID</p>
                            <div class="flex items-center gap-1 mt-2 text-sky-500">
                                <span class="text-[9px] font-black uppercase">Explorer</span>
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategories(query) {
            const cards = document.querySelectorAll('.category-card');
            cards.forEach(card => {
                const name = card.querySelector('span').innerText.toLowerCase();
                card.style.display = name.includes(query.toLowerCase()) ? 'flex' : 'none';
            });
        }

        function goToCategory(name) {
            // Redirige vers la page d'accueil avec le filtre activé
            window.location.href = `index.html?category=${encodeURIComponent(name)}`;
        }
function goToCategory(name) {
    // On envoie vers la page dynamique avec le paramètre 'cat'
    window.location.href = `category-view.html?cat=${encodeURIComponent(name)}`;
}

    </script>
</body>
</html>
