<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gérer les Promotions | YARID</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('YARID PWA : Prête !'))
            .catch(err => console.log('Erreur PWA :', err));
        });
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="analytics.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #f1f5f9; 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); 
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }
        
        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        
        .input-field {
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            background: white;
            border-color: #0ea5e9;
            outline: none;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }
        
        .promo-item {
            background: #f8fafc;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        
        .promo-item:hover {
            border-color: #0ea5e9;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1);
        }
        
        .btn-danger {
            background: #fef2f2;
            color: #ef4444;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
        }
        
        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }
        
        .stat-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        
        .badge-active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .badge-expired {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        .badge-upcoming {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
    </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YARID">

<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon_16.png">
<link rel="apple-touch-icon" href="/icons/ios.png">

<meta property="og:type" content="website">
<meta property="og:title" content="YARID - Boutique Premium">
<meta property="og:description" content="Votre destination exclusive pour des produits d'exception au Cameroun.">
<meta property="og:image" content="/icons/icon_512.png">
<meta property="og:url" content="https://votre-site.netlify.app">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur SW:', err));
    });
  }
</script>

</head>
<body class="min-h-screen p-4 md:p-8">
    
    <div class="max-w-5xl mx-auto">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black italic uppercase tracking-tighter text-slate-900">
                    Gestion des <span class="text-sky-500">Promotions</span>
                </h1>
                <p class="text-sm text-slate-500 mt-1">Créez et gérez vos offres promotionnelles</p>
            </div>
            <div class="flex gap-3">
                <a href="admin.html" class="px-5 py-3 bg-slate-100 text-slate-600 rounded-2xl text-xs font-bold uppercase tracking-wider hover:bg-slate-200 transition">
                    ← Retour Dashboard
                </a>
            </div>
        </header>
        
        <!-- Stats Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Actives</p>
                <p class="text-3xl font-black text-emerald-500" id="stat-active">0</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">À venir</p>
                <p class="text-3xl font-black text-amber-500" id="stat-upcoming">0</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Expirées</p>
                <p class="text-3xl font-black text-red-500" id="stat-expired">0</p>
            </div>
            <div class="stat-card">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Total</p>
                <p class="text-3xl font-black text-sky-500" id="stat-total">0</p>
            </div>
        </div>
        
        <div class="grid lg:grid-cols-5 gap-6">
            
            <!-- Formulaire -->
            <div class="lg:col-span-2">
                <div class="card p-6 sticky top-4">
                    <h2 class="text-lg font-black uppercase tracking-tighter mb-6 flex items-center gap-2">
                        <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                        Nouvelle Promo
                    </h2>
                    
                    <form id="promoForm" class="space-y-4">
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Titre de la promo</label>
                            <input type="text" id="promoTitre" placeholder="Ex: Soldes d'été" required 
                                   class="input-field w-full p-4 text-sm font-semibold">
                        </div>
                        
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Description</label>
                            <textarea id="promoDesc" placeholder="Décrivez l'offre..." required 
                                      class="input-field w-full p-4 text-sm font-semibold h-24 resize-none"></textarea>
                        </div>
                        
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">URL de l'image</label>
                            <input type="url" id="promoImg" placeholder="https://..." required 
                                   class="input-field w-full p-4 text-sm font-semibold">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Date début</label>
                                <input type="date" id="dateDebut" required 
                                       class="input-field w-full p-4 text-sm font-semibold">
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Date fin</label>
                                <input type="date" id="dateFin" required 
                                       class="input-field w-full p-4 text-sm font-semibold">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Type</label>
                                <select id="promoType" class="input-field w-full p-4 text-sm font-semibold">
                                    <option value="percentage">Pourcentage %</option>
                                    <option value="fixed">Montant fixe</option>
                                    <option value="free_shipping">Livraison gratuite</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Valeur</label>
                                <input type="number" id="promoValue" placeholder="20" 
                                       class="input-field w-full p-4 text-sm font-semibold">
                            </div>
                        </div>
                        
                        <div>
                            <label class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 block">Code promo (optionnel)</label>
                            <input type="text" id="promoCode" placeholder="Ex: ETE2025" 
                                   class="input-field w-full p-4 text-sm font-semibold uppercase">
                        </div>
                        
                        <button type="submit" class="btn-primary w-full py-4 rounded-2xl text-white font-black uppercase text-xs tracking-wider mt-4">
                            Publier la Promotion
                        </button>
                    </form>
                </div>
            </div>
            
            <!-- Liste des promotions -->
            <div class="lg:col-span-3">
                <div class="card p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-black uppercase tracking-tighter">Promotions Actives</h2>
                        <div class="flex gap-2">
                            <button onclick="filterPromos('all')" class="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-900 text-white" id="filter-all">Tout</button>
                            <button onclick="filterPromos('active')" class="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600" id="filter-active">Actives</button>
                            <button onclick="filterPromos('expired')" class="px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600" id="filter-expired">Expirées</button>
                        </div>
                    </div>
                    
                    <div id="promoList" class="space-y-3">
                        <div class="text-center py-10">
                            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg class="w-8 h-8 text-slate-400 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                </svg>
                            </div>
                            <p class="text-slate-400 text-sm">Chargement des promotions...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allPromos = [];
        let currentFilter = 'all';
        
        // Charger les promos
        async function fetchPromos() {
            const { data, error } = await _supabase.from('PROMOTIONS').select('*').order('id', { ascending: false });
            
            if (error) {
                console.error('Erreur chargement promotions:', error);
                document.getElementById('promoList').innerHTML = `
                    <div class="text-center py-10 text-red-500">
                        <p>Erreur lors du chargement</p>
                    </div>
                `;
                return;
            }
            
            allPromos = data || [];
            updateStats();
            renderPromos();
        }
        
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            
            const active = allPromos.filter(p => p.date_debut <= today && p.date_fin >= today).length;
            const upcoming = allPromos.filter(p => p.date_debut > today).length;
            const expired = allPromos.filter(p => p.date_fin < today).length;
            
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-upcoming').textContent = upcoming;
            document.getElementById('stat-expired').textContent = expired;
            document.getElementById('stat-total').textContent = allPromos.length;
        }
        
        function getPromoStatus(promo) {
            const today = new Date().toISOString().split('T')[0];
            if (promo.date_fin < today) return 'expired';
            if (promo.date_debut > today) return 'upcoming';
            return 'active';
        }
        
        function getStatusBadge(status) {
            const badges = {
                'active': '<span class="badge-active text-white text-[10px] font-black px-2 py-1 rounded-full">ACTIVE</span>',
                'upcoming': '<span class="badge-upcoming text-white text-[10px] font-black px-2 py-1 rounded-full">À VENIR</span>',
                'expired': '<span class="badge-expired text-white text-[10px] font-black px-2 py-1 rounded-full">EXPIRÉE</span>'
            };
            return badges[status] || '';
        }
        
        function renderPromos() {
            const list = document.getElementById('promoList');
            
            let filtered = allPromos;
            if (currentFilter !== 'all') {
                filtered = allPromos.filter(p => getPromoStatus(p) === currentFilter);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-10 text-slate-400">
                        <svg class="w-16 h-16 mx-auto mb-4 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                        <p>Aucune promotion ${currentFilter !== 'all' ? 'dans cette catégorie' : ''}</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(p => {
                const status = getPromoStatus(p);
                const discountText = p.type === 'percentage' ? `-${p.value}%` : 
                                    p.type === 'fixed' ? `-${p.value} FCFA` : 'Livraison gratuite';
                
                return `
                    <div class="promo-item p-4">
                        <div class="flex gap-4">
                            <div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0 bg-slate-100">
                                <img src="${p.image_url || 'https://via.placeholder.com/100'}" class="w-full h-full object-cover" alt="${p.titre}">
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-start justify-between gap-2">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            ${getStatusBadge(status)}
                                            ${p.code ? `<span class="bg-sky-100 text-sky-600 text-[10px] font-bold px-2 py-0.5 rounded">${p.code}</span>` : ''}
                                        </div>
                                        <h3 class="font-bold text-slate-900 truncate">${p.titre}</h3>
                                        <p class="text-xs text-slate-500 truncate">${p.description}</p>
                                    </div>
                                    <button onclick="deletePromo(${p.id})" class="btn-danger px-3 py-2 text-xs font-bold uppercase">
                                        Suppr.
                                    </button>
                                </div>
                                <div class="flex items-center justify-between mt-3">
                                    <div class="text-xs text-slate-400">
                                        <span class="font-semibold text-slate-600">${discountText}</span> • 
                                        Du ${formatDate(p.date_debut)} au ${formatDate(p.date_fin)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
        }
        
        function filterPromos(filter) {
            currentFilter = filter;
            
            // Update buttons
            ['all', 'active', 'expired'].forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if (f === filter) {
                    btn.className = 'px-3 py-1.5 rounded-full text-xs font-bold bg-slate-900 text-white';
                } else {
                    btn.className = 'px-3 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200';
                }
            });
            
            renderPromos();
        }
        
        // Supprimer une promo
        window.deletePromo = async (id) => {
            if(confirm("Êtes-vous sûr de vouloir supprimer cette promotion ?")) {
                try {
                    await _supabase.from('PROMOTIONS').delete().eq('id', id);
                    fetchPromos();
                } catch (err) {
                    alert('Erreur lors de la suppression');
                }
            }
        };
        
        // Ajouter une promo
        document.getElementById('promoForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span>Publication...';
            
            try {
                await _supabase.from('PROMOTIONS').insert([{
                    titre: document.getElementById('promoTitre').value,
                    description: document.getElementById('promoDesc').value,
                    image_url: document.getElementById('promoImg').value,
                    date_debut: document.getElementById('dateDebut').value,
                    date_fin: document.getElementById('dateFin').value,
                    type: document.getElementById('promoType').value,
                    value: parseInt(document.getElementById('promoValue').value) || 0,
                    code: document.getElementById('promoCode').value.toUpperCase() || null
                }]);
                
                // Tracker l'événement
                if (window.trackYaridEvent) {
                    trackYaridEvent('promo_created', {
                        title: document.getElementById('promoTitre').value,
                        type: document.getElementById('promoType').value
                    });
                }
                
                alert("Promotion publiée avec succès !");
                document.getElementById('promoForm').reset();
                fetchPromos();
                
            } catch (err) {
                console.error('Erreur création promo:', err);
                alert('Erreur lors de la publication');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Publier la Promotion';
            }
        };
        
        // Initialisation
        fetchPromos();
        
        // Auth check
        (function() {
            const session = sessionStorage.getItem('yarid_admin_session');
            if (session !== 'active' && !window.location.pathname.includes('login.html')) {
                window.location.href = 'login.html';
            }
        })();
    </script>
</body>
</html>
