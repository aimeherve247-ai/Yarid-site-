<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Catégorie | YARID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; }
        
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:active { transform: scale(0.95); }
        
        .btn-whatsapp { 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); 
        }
        
        .btn-cart { background: #0f172a; }

        /* Style du Panier Latéral */
        .cart-drawer {
            position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px;
            background: white; z-index: 1100; transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        .cart-drawer.open { transform: translateX(0); }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 1050; display: none; backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }
    </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YARID">

<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon_16.png">
<link rel="apple-touch-icon" href="/icons/ios.png">

<meta property="og:type" content="website">
<meta property="og:title" content="YARID - Boutique Premium">
<meta property="og:description" content="Votre destination exclusive pour des produits d'exception au Cameroun.">
<meta property="og:image" content="/icons/icon_512.png">
<meta property="og:url" content="https://votre-site.netlify.app">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur SW:', err));
    });
  }
</script>

</head>
<body class="pb-20">

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-slate-100 p-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 id="category-title" class="text-xl font-black uppercase italic tracking-tight text-slate-900">Boutique</h1>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2 rounded-full hover:bg-slate-100 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-sky-500 text-white text-[10px] font-black rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <main class="p-4">
        <div id="products-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer flex flex-col shadow-2xl" id="cart-drawer">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="font-black uppercase italic text-lg tracking-tighter">Mon Panier</h2>
            <button onclick="toggleCart()" class="p-2 hover:bg-slate-100 rounded-full">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>
        <div class="p-6 bg-slate-50 border-t">
            <div class="flex justify-between mb-4">
                <span class="font-bold text-slate-500 text-xs uppercase">Total estimé</span>
                <span id="cart-total" class="font-black text-sky-600">0 FCFA</span>
            </div>
            <button onclick="orderViaWhatsApp()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                Commander via WhatsApp
            </button>
        </div>
    </div>

    <script>
        // Configuration Supabase avec vos clés exactes
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Récupération de la catégorie depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || urlParams.get('cat'); // Gère "category" ou "cat"
        
        let cart = JSON.parse(localStorage.getItem('yarid_cart')) || []; // Synchronisé avec votre fichier index

        async function fetchProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '<div class="col-span-2 text-center py-20 text-slate-400 animate-pulse">Recherche des pépites...</div>';

            try {
                // Utilisation de la table PRODUITS (comme dans votre index.html)
                let query = _supabase.from('PRODUITS').select('*');
                
                if (category && category !== 'all' && category !== '') {
                    // Utilisation de la colonne categorie (comme dans votre index.html)
                    query = query.eq('categorie', category);
                    document.getElementById('category-title').innerText = category;
                }

                const { data, error } = await query;

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<div class="col-span-2 text-center py-20 text-slate-400 uppercase text-xs font-bold">Aucun produit dans cette catégorie</div>';
                    return;
                }

                grid.innerHTML = data.map(product => {
                    const price = product.price || product.prix || 0;
                    const name = product.name || product.nom || "Produit";
                    
                    return `
                    <div class="product-card bg-white rounded-3xl p-3 shadow-sm border border-slate-50 flex flex-col h-full">
                        <div class="relative aspect-square mb-3 overflow-hidden rounded-2xl bg-slate-50">
                            <img src="${product.image_url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                        </div>
                        <h3 class="font-bold text-slate-900 text-[11px] truncate mb-1 uppercase tracking-tight">${name}</h3>
                        <span class="text-xs font-black text-sky-600 mb-4">${Number(price).toLocaleString()} FCFA</span>
                        
                        <div class="grid grid-cols-1 gap-2 mt-auto">
                            <button onclick="addToCart('${product.id}', '${name.replace(/'/g, "\\'")}', ${price}, '${product.image_url}')" 
                                    class="btn-cart text-white py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                                Ajouter
                            </button>
                            <a href="https://wa.me/237655959284?text=Bonjour%20YARID%2C%20je%20souhaite%20commander%20le%20produit%20%3A%20${encodeURIComponent(name)}" 
                               class="btn-whatsapp text-white py-2.5 rounded-xl text-[10px] font-bold uppercase text-center tracking-widest flex items-center justify-center gap-2">
                                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-.347-.149-.347-.149..."/>
                                </svg>
                                WhatsApp
                            </a>
                        </div>
                    </div>
                `}).join('');

            } catch (err) {
                console.error("Erreur:", err);
                grid.innerHTML = '<div class="col-span-2 text-center py-20 text-rose-500 text-xs font-bold uppercase">Erreur de connexion à la base de données</div>';
            }
        }

        // --- Fonctions du Panier ---
        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(id, name, price, image) {
            const index = cart.findIndex(item => item.id === id);
            if (index > -1) {
                cart[index].quantity += 1;
            } else {
                cart.push({ id, name, price, image, quantity: 1 });
            }
            localStorage.setItem('yarid_cart', JSON.stringify(cart));
            updateCartUI();
            
            // Animation du badge
            const badge = document.getElementById('cart-count');
            badge.classList.add('scale-125');
            setTimeout(() => badge.classList.remove('scale-125'), 200);
        }

        function updateCartQty(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('yarid_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('yarid_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((t, i) => t + i.quantity, 0);
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            
            const total = cart.reduce((t, i) => t + (i.price * i.quantity), 0);
            document.getElementById('cart-total').innerText = `${total.toLocaleString()} FCFA`;

            const itemsContainer = document.getElementById('cart-items');
            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p class="text-center text-slate-400 py-10 text-xs uppercase font-bold tracking-widest">Votre panier est vide</p>';
            } else {
                itemsContainer.innerHTML = cart.map((item, idx) => `
                    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl relative">
                        <img src="${item.image}" class="w-12 h-12 rounded-xl object-cover">
                        <div class="flex-1 min-w-0">
                            <div class="text-[10px] font-bold uppercase truncate pr-4">${item.name}</div>
                            <div class="text-sky-600 text-[10px] font-black">${item.price.toLocaleString()} FCFA</div>
                        </div>
                        
                        <div class="flex items-center gap-2 bg-white border border-slate-100 rounded-xl p-1">
                            <button onclick="updateCartQty(${idx}, -1)" class="w-6 h-6 rounded-lg bg-slate-50 font-bold text-slate-600">-</button>
                            <span class="w-4 text-center font-bold text-xs">${item.quantity}</span>
                            <button onclick="updateCartQty(${idx}, 1)" class="w-6 h-6 rounded-lg bg-slate-50 font-bold text-slate-600">+</button>
                        </div>
                        
                        <button onclick="removeFromCart(${idx})" class="text-slate-300 hover:text-rose-500 ml-1">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg>
                        </button>
                    </div>
                `).join('');
            }
        }

        function orderViaWhatsApp() {
            if (cart.length === 0) return alert('Votre panier est vide !');
            
            const cartSummary = cart.map(i => `• ${i.quantity}x ${i.name} = ${(i.price * i.quantity).toLocaleString()} FCFA`).join('\n');
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const msg = `*COMMANDE YARID* 🛒\n\n${cartSummary}\n\n*TOTAL : ${total.toLocaleString()} FCFA*\n\nMerci de confirmer ma commande !`;
            window.location.href = `https://wa.me/237655959284?text=${encodeURIComponent(msg)}`;
        }

        // Initialisation
        window.onload = () => {
            fetchProducts();
            updateCartUI();
        };
    </script>
</body>
</html>
