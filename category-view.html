<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Catégorie | YARID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cart-global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; }
        
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:active { transform: scale(0.95); }
        
        .btn-whatsapp { 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); 
        }
        
        .btn-cart { background: #0f172a; }

        /* Style du Panier Latéral */
        .cart-drawer {
            position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px;
            background: white; z-index: 1100; transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        .cart-drawer.open { transform: translateX(0); }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 1050; display: none; backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }
    </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YARID">

<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon_16.png">
<link rel="apple-touch-icon" href="/icons/ios.png">

<meta property="og:type" content="website">
<meta property="og:title" content="YARID - Boutique Premium">
<meta property="og:description" content="Votre destination exclusive pour des produits d'exception au Cameroun.">
<meta property="og:image" content="/icons/icon_512.png">
<meta property="og:url" content="https://votre-site.netlify.app">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur SW:', err));
    });
  }
</script>

</head>
<body class="pb-20">

    <!-- Modal Details Produit -->
    <div class="category-modal" id="category-product-modal">
        <div class="category-modal-content">
            <div class="relative">
                <button onclick="closeCategoryProductModal()" class="absolute top-4 right-4 z-10 w-10 h-10 bg-white/90 backdrop-blur rounded-full flex items-center justify-center shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <img id="cat-modal-image" src="" class="w-full aspect-[4/3] object-cover" alt="">
            </div>
            <div class="p-5">
                <p class="text-sky-500 text-xs font-bold uppercase tracking-wider mb-1" id="cat-modal-category">Produit</p>
                <h2 class="text-2xl font-black uppercase italic leading-tight mb-2" id="cat-modal-title">Nom Produit</h2>
                <div class="flex items-center gap-3 mb-4">
                    <p class="text-2xl font-black text-slate-900" id="cat-modal-price">0 FCFA</p>
                    <p class="text-sm text-slate-400 line-through" id="cat-modal-old-price"></p>
                </div>
                <p class="text-slate-600 text-sm leading-relaxed mb-6" id="cat-modal-desc">Description du produit...</p>
                <div class="mb-6">
                    <p class="text-sm font-bold mb-2">Quantite</p>
                    <div class="flex items-center gap-4 bg-slate-100 w-fit rounded-2xl p-1">
                        <button onclick="updateCatModalQty(-1)" class="w-10 h-10 rounded-xl bg-white shadow-sm font-bold text-slate-600 active:scale-95 transition">-</button>
                        <span class="w-8 text-center font-bold" id="cat-modal-qty">1</span>
                        <button onclick="updateCatModalQty(1)" class="w-10 h-10 rounded-xl bg-white shadow-sm font-bold text-slate-600 active:scale-95 transition">+</button>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="addToCartFromCategoryModal()" class="btn-cart flex-1 py-4 rounded-2xl text-white font-bold uppercase tracking-wider text-sm flex items-center justify-center gap-2 active:scale-95 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        Ajouter au panier
                    </button>
                    <button onclick="toggleCart(); closeCategoryProductModal();" class="bg-slate-100 flex-1 py-4 rounded-2xl text-slate-700 font-bold uppercase tracking-wider text-sm flex items-center justify-center gap-2 active:scale-95 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        Voir le panier
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .category-modal { position: fixed; inset: 0; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .category-modal.active { opacity: 1; pointer-events: all; }
        .category-modal-content { position: absolute; bottom: 0; left: 0; right: 0; max-height: 90vh; overflow-y: auto; background: white; border-radius: 1.5rem 1.5rem 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
        .category-modal.active .category-modal-content { transform: translateY(0); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-slate-100 p-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 id="category-title" class="text-xl font-black uppercase italic tracking-tight text-slate-900">Boutique</h1>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2 rounded-full hover:bg-slate-100 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-sky-500 text-white text-[10px] font-black rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <main class="p-4">
        <div id="products-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer flex flex-col shadow-2xl" id="cart-drawer">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="font-black uppercase italic text-lg tracking-tighter">Mon Panier</h2>
            <button onclick="toggleCart()" class="p-2 hover:bg-slate-100 rounded-full">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>
        <div class="p-6 bg-slate-50 border-t">
            <div class="flex justify-between mb-4">
                <span class="font-bold text-slate-500 text-xs uppercase">Total estimé</span>
                <span id="cart-total" class="font-black text-sky-600">0 FCFA</span>
            </div>
            <button onclick="orderViaWhatsApp()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                Commander via WhatsApp
            </button>
        </div>
    </div>

    <script>
        // Configuration Supabase avec vos clés exactes
        const SUPABASE_URL = 'https://whcpugnkldbmuqzgqxbe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LbTOPS3OgBPIJHJGEFKg9Q_djLjGvdk'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Récupération de la catégorie depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || urlParams.get('cat'); // Gère "category" ou "cat"
        
        async function fetchProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '<div class="col-span-2 text-center py-20 text-slate-400 animate-pulse">Recherche des pépites...</div>';

            try {
                // Utilisation de la table PRODUITS (comme dans votre index.html)
                let query = _supabase.from('PRODUITS').select('*');
                
                if (category && category !== 'all' && category !== '') {
                    // Utilisation de la colonne categorie (comme dans votre index.html)
                    query = query.eq('categorie', category);
                    document.getElementById('category-title').innerText = category;
                }

                const { data, error } = await query;

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<div class="col-span-2 text-center py-20 text-slate-400 uppercase text-xs font-bold">Aucun produit dans cette catégorie</div>';
                    return;
                }

                grid.innerHTML = data.map(product => {
                    const price = product.price || product.prix || 0;
                    const name = product.name || product.nom || "Produit";
                    const safeName = name.replace(/'/g, "\\'");
                    const safeDesc = (product.description || '').replace(/'/g, "\\'").replace(/"/g, '\\"');
                    const safeImage = product.image_url || '';
                    const safeCategory = (product.categorie || '').replace(/'/g, "\\'");
                    const oldPrice = product.old_price || '';

                    return `
                    <div class="product-card bg-white rounded-3xl p-3 shadow-sm border border-slate-50 flex flex-col h-full cursor-pointer" onclick="openProductDetailModal({id:'${product.id}',name:'${safeName}',price:${price},old_price:'${oldPrice}',image_url:'${safeImage}',categorie:'${safeCategory}',description:'${safeDesc}'})">
                        <div class="relative aspect-square mb-3 overflow-hidden rounded-2xl bg-slate-50">
                            <img src="${product.image_url}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'" alt="${name}">
                            ${product.old_price ? '<span class="absolute top-2 right-2 bg-red-500 text-white text-[9px] font-black px-2 py-1 rounded-full">-' + Math.round((1 - product.price/product.old_price)*100) + '%</span>' : ''}
                        </div>
                        <h3 class="font-bold text-slate-900 text-[11px] truncate mb-1 uppercase tracking-tight">${name}</h3>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-black text-sky-600">${Number(price).toLocaleString()} FCFA</span>
                            ${product.old_price ? '<span class="text-[10px] text-slate-400 line-through">' + Number(product.old_price).toLocaleString() + ' F</span>' : ''}
                        </div>
                        ${product.description ? '<p class="text-[10px] text-slate-400 mb-2 line-clamp-2">' + product.description + '</p>' : ''}
                        <div class="grid grid-cols-1 gap-2 mt-auto" onclick="event.stopPropagation();">
                            <button onclick="event.stopPropagation(); openProductDetailModal({id:'${product.id}',name:'${safeName}',price:${price},old_price:'${oldPrice}',image_url:'${safeImage}',categorie:'${safeCategory}',description:'${safeDesc}'});"
                                    class="btn-cart text-white py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:opacity-90 transition">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                Voir details
                            </button>
                            <a href="https://wa.me/237655959284?text=Bonjour%20YARID%2C%20je%20souhaite%20commander%20le%20produit%20%3A%20${encodeURIComponent(name)}"
                               onclick="event.stopPropagation();"
                               class="btn-whatsapp text-white py-2.5 rounded-xl text-[10px] font-bold uppercase text-center tracking-widest flex items-center justify-center gap-2">
                                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                                </svg>
                                WhatsApp
                            </a>
                        </div>
                    </div>
                `}).join('');

            } catch (err) {
                console.error("Erreur:", err);
                grid.innerHTML = '<div class="col-span-2 text-center py-20 text-rose-500 text-xs font-bold uppercase">Erreur de connexion à la base de données</div>';
            }
        }

        // --- Modal Details Produit (Modification #3) ---
        let currentCategoryProduct = null;

        function openProductDetailModal(product) {
            if (!product) return;
            currentCategoryProduct = product;
            document.getElementById('cat-modal-image').src = product.image_url || 'https://via.placeholder.com/400x400';
            document.getElementById('cat-modal-category').textContent = product.categorie || 'Produit';
            document.getElementById('cat-modal-title').textContent = product.name || 'Sans nom';
            document.getElementById('cat-modal-price').textContent = (Number(product.price || 0)).toLocaleString() + ' FCFA';
            document.getElementById('cat-modal-old-price').textContent = product.old_price ? (Number(product.old_price)).toLocaleString() + ' FCFA' : '';
            document.getElementById('cat-modal-desc').textContent = product.description || 'Decouvrez ce produit exclusif chez YARID.';
            document.getElementById('cat-modal-qty').textContent = '1';
            document.getElementById('category-product-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCategoryProductModal() {
            document.getElementById('category-product-modal').classList.remove('active');
            document.body.style.overflow = '';
            currentCategoryProduct = null;
        }

        function updateCatModalQty(delta) {
            const qtyEl = document.getElementById('cat-modal-qty');
            let qty = parseInt(qtyEl.textContent) || 1;
            qty = Math.max(1, qty + delta);
            qtyEl.textContent = qty;
        }

        function addToCartFromCategoryModal() {
            const product = currentCategoryProduct;
            if (!product) return;
            const qty = parseInt(document.getElementById('cat-modal-qty').textContent) || 1;
            addToCart(product, qty);
            closeCategoryProductModal();
        }

        // Initialisation
        window.onload = () => {
            fetchProducts();
            updateCartUI();
        };
    </script>
</body>
</html>
